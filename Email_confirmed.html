<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - Welcome!</title>
    
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Configuration and Animations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        success: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Animations */
        @keyframes slideUpFade {
            0% { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes scaleInBop {
            0% { 
                opacity: 0; 
                transform: scale(0.5); 
            }
            60% { 
                opacity: 1; 
                transform: scale(1.1); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        @keyframes drawCheck {
            0% {
                stroke-dashoffset: 48;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }

        .animate-card {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .animate-icon-container {
            animation: scaleInBop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        .animate-check {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: drawCheck 0.5s ease-out 0.6s forwards;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800 antialiased selection:bg-success-100 selection:text-success-700">

    <!-- Main Card -->
    <main class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 max-w-md w-full p-8 sm:p-10 text-center animate-card relative overflow-hidden">
        
        <!-- Decorative background glow -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-gradient-to-b from-success-50 to-transparent -z-10 rounded-t-3xl"></div>

        <!-- Success Icon -->
        <div class="animate-icon-container mx-auto flex items-center justify-center w-24 h-24 bg-success-100 text-success-600 rounded-full mb-8 shadow-sm border-4 border-white ring-1 ring-success-50">
            <svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path class="animate-check" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- Text Content -->
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-3 tracking-tight">
            Email Confirmed Successfully!
        </h1>
        <p class="text-gray-500 text-[15px] sm:text-base leading-relaxed mb-8 px-2">
            Your account has been verified and is ready to use. Thank you for joining us.
        </p>

        <!-- Continue Button -->
        <button id="continueBtn" class="w-full bg-success-500 hover:bg-success-600 active:bg-success-700 text-white font-semibold text-lg py-3.5 px-6 rounded-xl transition-all duration-200 transform hover:-translate-y-0.5 hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-success-100 flex items-center justify-center gap-2 group">
            <span>Continue</span>
            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </button>

    </main>

    <!-- Interactive Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const continueBtn = document.getElementById('continueBtn');
            
            continueBtn.addEventListener('click', () => {
                // Add a small visual feedback before redirecting
                continueBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Loading...
                `;
                continueBtn.disabled = true;
                continueBtn.classList.add('opacity-90', 'cursor-not-allowed');

                // Redirect to index.html after a tiny delay for smoothness
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 300);
            });
        });
    </script>
</body>
</html>
