<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MedBot - Medications</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b2c5ff",
                        "tertiary-container": "#7d5200",
                        "tertiary-fixed-dim": "#ffb950",
                        "primary": "#003d9b",
                        "inverse-surface": "#2e3132",
                        "on-surface": "#191c1e",
                        "on-secondary-container": "#00734c",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dae2ff",
                        "secondary": "#006c47",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-secondary-fixed-variant": "#005235",
                        "tertiary": "#5e3c00",
                        "on-surface-variant": "#434654",
                        "on-background": "#191c1e",
                        "surface-bright": "#f8f9fb",
                        "tertiary-fixed": "#ffddb3",
                        "secondary-fixed-dim": "#65dca4",
                        "inverse-primary": "#b2c5ff",
                        "on-primary-container": "#c4d2ff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "surface-container": "#edeef0",
                        "on-tertiary-fixed": "#291800",
                        "surface-tint": "#0c56d0",
                        "secondary-container": "#82f9be",
                        "outline-variant": "#c3c6d6",
                        "outline": "#737685",
                        "surface-container-high": "#e7e8ea",
                        "surface-container-highest": "#e1e2e4",
                        "surface-variant": "#e1e2e4",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f1f3",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#0040a2",
                        "primary-container": "#0052cc",
                        "surface-dim": "#d9dadc",
                        "on-tertiary-container": "#ffca81",
                        "surface": "#f8f9fb",
                        "on-secondary-fixed": "#002113",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#001848",
                        "background": "#f8f9fb",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f3f4f6",
                        "secondary-fixed": "#82f9be"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "stack-sm": "8px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "stack-md": "16px",
                        "gutter": "24px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8f9fb;
            min-height: max(884px, 100dvh);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #c3c6d6; border-radius: 10px; }
        
        .toggle-checkbox:checked { right: 0; border-color: #006c47; }
        .toggle-checkbox:checked + .toggle-label { background-color: #006c47; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }
        
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }
        
        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003d9b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-on-background font-body-md min-h-screen flex flex-col antialiased hidden" id="app-body">

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg pt-12 pb-32">
        <div class="flex justify-between items-end mb-stack-lg">
            <div>
                <h1 class="text-[28px] md:text-[32px] font-bold text-on-background tracking-tight">Active Medications</h1>
                <p class="text-[16px] text-on-surface-variant mt-2">Manage your current prescriptions and schedules.</p>
            </div>
            <div class="hidden md:block">
                <button onclick="openModal()" class="bg-primary text-on-primary hover:bg-on-primary-fixed-variant font-semibold text-[14px] px-6 py-3 rounded-full flex items-center gap-2 transition-colors h-[48px] shadow-sm">
                    <span class="material-symbols-outlined text-[20px]">add</span> Add New
                </button>
            </div>
        </div>

        <!-- Bento Grid / Cards Layout -->
        <div id="medications-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
            <div class="loader col-span-full"></div>
        </div>
    </main>

    <!-- Mobile FAB -->
    <button onclick="openModal()" class="md:hidden fixed right-6 bottom-28 w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center z-40 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-[28px]">add</span>
    </button>

    <!-- BottomNavBar (Mobile) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-safe bg-surface-container-lowest border-t border-outline-variant z-50 shadow-sm">
        <a href="index.html" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container active:scale-95 transition-transform duration-150 rounded-lg group">
            <span class="material-symbols-outlined mb-1 group-hover:text-primary transition-colors">today</span>
            <span class="text-[12px] font-semibold group-hover:text-primary transition-colors">Today</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-95 transition-transform duration-150">
            <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">medication</span>
            <span class="text-[12px] font-bold">Meds</span>
        </a>
    </nav>

    <!-- Add/Edit Medication Modal -->
    <div id="med-modal" class="fixed inset-0 bg-on-surface/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 sm:p-6 overflow-y-auto">
        <div class="bg-surface-container-lowest w-full max-w-lg rounded-2xl shadow-xl flex flex-col max-h-full my-auto overflow-hidden">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-outline-variant flex justify-between items-center bg-surface sticky top-0 z-10">
                <h2 id="modal-title" class="text-[20px] font-bold text-on-surface">Add Medication</h2>
                <button onclick="closeModal()" class="text-on-surface-variant hover:bg-surface-container rounded-full p-1 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="p-6 overflow-y-auto flex-grow custom-scrollbar">
                <form id="med-form" class="space-y-6">
                    <input type="hidden" id="med-id">
                    
                    <!-- Basic Info -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[14px] font-semibold text-on-surface mb-1">Medication Name *</label>
                            <input type="text" id="med-name" required class="w-full rounded-lg border-outline-variant bg-surface px-4 py-2 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary" placeholder="e.g., Lisinopril 10mg">
                        </div>
                        <div>
                            <label class="block text-[14px] font-semibold text-on-surface mb-1">Notes / Instructions</label>
                            <textarea id="med-notes" rows="2" class="w-full rounded-lg border-outline-variant bg-surface px-4 py-2 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary" placeholder="e.g., Take with food"></textarea>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[14px] font-semibold text-on-surface mb-1">Start Date *</label>
                                <input type="date" id="med-start" required class="w-full rounded-lg border-outline-variant bg-surface px-4 py-2 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-[14px] font-semibold text-on-surface mb-1">End Date (Optional)</label>
                                <input type="date" id="med-end" class="w-full rounded-lg border-outline-variant bg-surface px-4 py-2 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[14px] font-semibold text-on-surface mb-1">Image (Optional)</label>
                            <input type="file" id="med-image" accept="image/*" class="w-full text-sm text-on-surface-variant file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary-container file:text-on-primary-container hover:file:bg-primary/20">
                            <p id="image-hint" class="text-xs text-on-surface-variant mt-1 hidden">Leave empty to keep existing image.</p>
                        </div>
                    </div>

                    <hr class="border-outline-variant">

                    <!-- Schedule Section -->
                    <div class="space-y-4">
                        <h3 class="text-[16px] font-bold text-on-surface">Schedule Details</h3>
                        
                        <div>
                            <label class="block text-[14px] font-semibold text-on-surface mb-2">Days of Week *</label>
                            <div class="flex flex-wrap gap-2" id="days-container">
                                <!-- Day Checkboxes generated via JS -->
                            </div>
                            <p id="days-error" class="text-error text-xs mt-1 hidden">Please select at least one day.</p>
                        </div>

                        <div>
                            <label class="block text-[14px] font-semibold text-on-surface mb-2">Reminder Times *</label>
                            <div id="times-container" class="space-y-2">
                                <!-- Time inputs generated via JS -->
                            </div>
                            <button type="button" onclick="addTimeInput()" class="mt-2 text-primary text-[14px] font-semibold flex items-center gap-1 hover:bg-primary-fixed-dim/20 px-3 py-1.5 rounded-lg transition-colors">
                                <span class="material-symbols-outlined text-[18px]">add_circle</span> Add another time
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
            <!-- Modal Footer -->
            <div class="px-6 py-4 border-t border-outline-variant bg-surface flex justify-between items-center sticky bottom-0 z-10 rounded-b-2xl">
                <div>
                    <button type="button" id="btn-delete" onclick="confirmDelete()" class="hidden text-error hover:bg-error-container hover:text-on-error-container px-4 py-2 rounded-lg font-semibold text-[14px] transition-colors items-center gap-1">
                        <span class="material-symbols-outlined text-[18px]">delete</span> Delete
                    </button>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal()" class="px-5 py-2 rounded-lg text-on-surface font-semibold text-[14px] hover:bg-surface-container transition-colors border border-outline-variant">Cancel</button>
                    <button type="button" id="btn-save" onclick="saveMedication()" class="bg-primary text-on-primary hover:bg-on-primary-fixed-variant px-5 py-2 rounded-lg font-semibold text-[14px] transition-colors flex items-center gap-2">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase & App Logic -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://nzlsvtquirifyjjpekaa.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56bHN2dHF1aXJpZnlqanBla2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MjQ3OTUsImV4cCI6MjA5NjQwMDc5NX0.GsHMQrI17QULABnjiQDT3MGqnI1AEmh5gx-CY5BLA1M'
        const supabase = createClient(supabaseUrl, supabaseKey)

        let currentUser = null;
        let medicationsList = [];

        // UI Colors/Themes mapping for variety in UI based on index (Mockup design element)
        const themeClasses = [
            { bgIcon: 'bg-primary-container text-on-primary-container', bgBlob: 'bg-primary-fixed-dim/20' },
            { bgIcon: 'bg-tertiary-container text-on-tertiary-container', bgBlob: 'bg-tertiary-fixed-dim/20' },
            { bgIcon: 'bg-secondary-container text-on-secondary-container', bgBlob: 'bg-secondary-fixed-dim/20' },
        ];

        // Days mapping
        const dayNamesMap = [
            { val: 0, label: 'Sun' }, { val: 1, label: 'Mon' }, { val: 2, label: 'Tue' },
            { val: 3, label: 'Wed' }, { val: 4, label: 'Thu' }, { val: 5, label: 'Fri' }, { val: 6, label: 'Sat' }
        ];

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = session.user;
            document.getElementById('app-body').classList.remove('hidden');
            
            // Generate Days Checkboxes in Modal
            const daysContainer = document.getElementById('days-container');
            daysContainer.innerHTML = dayNamesMap.map(d => `
                <label class="cursor-pointer">
                    <input type="checkbox" name="days" value="${d.val}" class="peer sr-only">
                    <div class="px-3 py-1.5 rounded-full border border-outline-variant text-[14px] text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container peer-checked:font-bold transition-all select-none">
                        ${d.label}
                    </div>
                </label>
            `).join('');

            loadMedications();
        }

        // --- Timezone Conversion Utilities ---
        function localTimeToUTC(localTimeStr) {
            const [hours, minutes] = localTimeStr.split(':');
            const d = new Date();
            d.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            return d.toISOString().split('T')[1].substring(0, 8); // "HH:MM:SS"
        }

        function utcToLocalTime(utcTimeStr) {
            const [hours, minutes, seconds] = utcTimeStr.split(':');
            const d = new Date();
            d.setUTCHours(parseInt(hours), parseInt(minutes), parseInt(seconds || 0), 0);
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function formatLocalTime(localTimeStr) {
            const [hourStr, minuteStr] = localTimeStr.split(':');
            let hours = parseInt(hourStr);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            return `${hours}:${minuteStr} ${ampm}`;
        }

        // --- Render Helpers ---
        function formatDaysText(daysArr) {
            if (!daysArr || daysArr.length === 0) return '';
            if (daysArr.length === 7) return 'Daily';
            
            const isWeekdays = [1,2,3,4,5].every(d => daysArr.includes(d)) && daysArr.length === 5;
            if (isWeekdays) return 'Weekdays';
            
            const isWeekends = [0,6].every(d => daysArr.includes(d)) && daysArr.length === 2;
            if (isWeekends) return 'Weekends';
            
            return daysArr.sort().map(d => dayNamesMap.find(dm => dm.val === d).label).join(', ');
        }

        // --- Main Load Function ---
        async function loadMedications() {
            try {
                const { data, error } = await supabase
                    .from('medications')
                    .select(`
                        id, name, notes, image_url, start_date, end_date, is_active,
                        schedules (id, time_utc, days_of_week)
                    `)
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                medicationsList = data;
                renderMedications();
            } catch (err) {
                console.error("Error loading medications:", err);
                document.getElementById('medications-grid').innerHTML = `<p class="text-error col-span-full">Failed to load medications.</p>`;
            }
        }

        function renderMedications() {
            const grid = document.getElementById('medications-grid');
            grid.innerHTML = '';

            const activeMeds = medicationsList.filter(m => m.is_active);
            
            if (activeMeds.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-surface-container-lowest border border-outline-variant rounded-xl">
                        <span class="material-symbols-outlined text-5xl text-outline mb-4">prescriptions</span>
                        <h3 class="text-on-surface font-semibold text-[20px]">No active medications</h3>
                        <p class="text-on-surface-variant text-[14px] mt-2 mb-6">Add your first medication to start tracking.</p>
                        <button onclick="openModal()" class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-semibold inline-flex items-center gap-2 mx-auto">
                            <span class="material-symbols-outlined">add</span> Add Medication
                        </button>
                    </div>`;
                return;
            }

            activeMeds.forEach((med, index) => {
                const theme = themeClasses[index % themeClasses.length];
                
                // Process Schedules
                let schedText = "No schedule set";
                let daysArr = [];
                let localTimes = [];

                if (med.schedules && med.schedules.length > 0) {
                    daysArr = med.schedules[0].days_of_week; // Assuming all times for a med share the same days in this simplified UI
                    const daysStr = formatDaysText(daysArr);
                    
                    // Convert all UTC times to formatted local times
                    localTimes = med.schedules.map(s => {
                        const local24 = utcToLocalTime(s.time_utc);
                        return formatLocalTime(local24);
                    }).sort();

                    schedText = `${daysStr} (${localTimes.join(', ')})`;
                }

                // Date logic
                let dateText = '';
                if (med.end_date) {
                    const end = new Date(med.end_date);
                    const now = new Date();
                    const diffTime = end.getTime() - now.getTime();
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays > 0) {
                        dateText = `${diffDays} days remaining`;
                    } else {
                        dateText = 'Treatment ended';
                    }
                } else {
                    dateText = 'Ongoing';
                }

                // Image or Icon
                const iconHtml = med.image_url 
                    ? `<img src="${med.image_url}" alt="${med.name}" class="w-12 h-12 rounded-full object-cover border border-outline-variant">`
                    : `<div class="w-12 h-12 rounded-full ${theme.bgIcon} flex items-center justify-center"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pill</span></div>`;

                const card = document.createElement('div');
                card.className = "bg-surface-container-lowest border border-outline-variant rounded-xl p-6 hover:shadow-md transition-shadow duration-200 flex flex-col h-full relative overflow-hidden group";
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 w-32 h-32 ${theme.bgBlob} rounded-bl-full -mr-8 -mt-8 pointer-events-none transition-transform group-hover:scale-110"></div>
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div class="flex items-start gap-4">
                            ${iconHtml}
                            <div>
                                <h3 class="font-semibold text-[20px] text-on-surface leading-tight">${med.name}</h3>
                                ${med.notes ? `<p class="text-[14px] text-on-surface-variant mt-1 line-clamp-1">${med.notes}</p>` : ''}
                            </div>
                        </div>
                        <div class="relative inline-block w-12 align-middle select-none z-20" title="Deactivate Medication">
                            <input checked type="checkbox" onchange="toggleMedStatus('${med.id}', this.checked)" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-outline-variant appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10 top-[2px] left-[2px]"/>
                            <label class="toggle-label block overflow-hidden h-7 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out"></label>
                        </div>
                    </div>
                    
                    <div class="flex-grow mt-2 space-y-3 relative z-10">
                        <div class="flex items-start gap-3 text-on-surface-variant text-[14px]">
                            <span class="material-symbols-outlined text-[20px] mt-0.5">schedule</span>
                            <span class="leading-snug">${schedText}</span>
                        </div>
                        <div class="flex items-center gap-3 text-on-surface-variant text-[14px]">
                            <span class="material-symbols-outlined text-[20px]">calendar_month</span>
                            <span>${dateText}</span>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-outline-variant flex justify-between items-center relative z-10">
                        <span class="inline-flex items-center rounded-full bg-secondary-fixed-dim/20 px-2.5 py-1 text-[12px] font-bold text-on-secondary-fixed-variant">Active</span>
                        <button onclick="openModal('${med.id}')" class="text-primary hover:text-primary-container font-bold text-[13px] uppercase tracking-wider px-3 py-1.5 hover:bg-surface-container rounded-md transition-colors">EDIT</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Add the Desktop "Add New" placeholder card
            const addCard = document.createElement('button');
            addCard.onclick = () => openModal();
            addCard.className = "hidden md:flex bg-surface-container-lowest/50 border-2 border-dashed border-outline-variant rounded-xl p-6 hover:bg-surface-container-lowest hover:border-primary hover:shadow-md transition-all duration-200 flex-col items-center justify-center min-h-[220px] h-full group text-center cursor-pointer";
            addCard.innerHTML = `
                <div class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-[28px]">add</span>
                </div>
                <h3 class="font-semibold text-[18px] text-primary">Add Medication</h3>
                <p class="text-[14px] text-on-surface-variant mt-1">Register a new prescription</p>
            `;
            grid.appendChild(addCard);
        }

        // --- Modal Interactions ---
        window.openModal = function(id = null) {
            document.getElementById('med-modal').classList.remove('hidden');
            document.getElementById('med-modal').classList.add('flex');
            document.getElementById('med-form').reset();
            document.getElementById('times-container').innerHTML = '';
            document.getElementById('days-error').classList.add('hidden');
            
            // Set defaults
            document.getElementById('med-start').value = new Date().toISOString().split('T')[0];
            
            if (id) {
                // EDIT MODE
                document.getElementById('modal-title').textContent = 'Edit Medication';
                document.getElementById('btn-delete').classList.remove('hidden');
                document.getElementById('image-hint').classList.remove('hidden');
                
                const med = medicationsList.find(m => m.id === id);
                document.getElementById('med-id').value = med.id;
                document.getElementById('med-name').value = med.name;
                document.getElementById('med-notes').value = med.notes || '';
                document.getElementById('med-start').value = med.start_date;
                if (med.end_date) document.getElementById('med-end').value = med.end_date;

                if (med.schedules && med.schedules.length > 0) {
                    // Check appropriate days
                    const days = med.schedules[0].days_of_week;
                    document.querySelectorAll('input[name="days"]').forEach(cb => {
                        if (days.includes(parseInt(cb.value))) cb.checked = true;
                    });
                    
                    // Add time inputs converted to local
                    med.schedules.forEach(s => {
                        window.addTimeInput(utcToLocalTime(s.time_utc));
                    });
                } else {
                    window.addTimeInput('08:00');
                }
            } else {
                // ADD MODE
                document.getElementById('modal-title').textContent = 'Add Medication';
                document.getElementById('btn-delete').classList.add('hidden');
                document.getElementById('image-hint').classList.add('hidden');
                document.getElementById('med-id').value = '';
                
                // Default daily, 8 AM
                document.querySelectorAll('input[name="days"]').forEach(cb => cb.checked = true);
                window.addTimeInput('08:00');
            }
        }

        window.closeModal = function() {
            document.getElementById('med-modal').classList.add('hidden');
            document.getElementById('med-modal').classList.remove('flex');
        }

        window.addTimeInput = function(val = '') {
            const container = document.getElementById('times-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `
                <input type="time" required value="${val}" class="time-input flex-grow rounded-lg border-outline-variant bg-surface px-4 py-2 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary">
                <button type="button" onclick="this.parentElement.remove()" class="text-on-surface-variant hover:text-error hover:bg-error-container p-2 rounded-md transition-colors flex-shrink-0">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            `;
            container.appendChild(div);
        }

        // --- CRUD Operations ---
        window.saveMedication = async function() {
            const form = document.getElementById('med-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Gather Days
            const selectedDays = Array.from(document.querySelectorAll('input[name="days"]:checked')).map(cb => parseInt(cb.value));
            if (selectedDays.length === 0) {
                document.getElementById('days-error').classList.remove('hidden');
                return;
            }
            document.getElementById('days-error').classList.add('hidden');

            // Gather Times
            const timeInputs = document.querySelectorAll('.time-input');
            if (timeInputs.length === 0) {
                alert("Please add at least one reminder time.");
                return;
            }
            const localTimes = Array.from(timeInputs).map(i => i.value);

            const saveBtn = document.getElementById('btn-save');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Saving...';
            saveBtn.disabled = true;

            try {
                const id = document.getElementById('med-id').value;
                const name = document.getElementById('med-name').value;
                const notes = document.getElementById('med-notes').value;
                const startDate = document.getElementById('med-start').value;
                const endDate = document.getElementById('med-end').value || null;
                const imageFile = document.getElementById('med-image').files[0];

                let imageUrl = null;
                
                // 1. Handle Image Upload (Optional)
                if (imageFile) {
                    const fileExt = imageFile.name.split('.').pop();
                    const fileName = `${currentUser.id}/${Math.random()}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('medication_images')
                        .upload(fileName, imageFile);
                    
                    if (uploadError) {
                        console.warn("Image upload failed (might need bucket setup):", uploadError);
                        // We continue saving without image if bucket isn't configured for this user
                    } else if (uploadData) {
                        const { data: { publicUrl } } = supabase.storage
                            .from('medication_images')
                            .getPublicUrl(fileName);
                        imageUrl = publicUrl;
                    }
                }

                // Prepare Medication Data
                const medData = {
                    user_id: currentUser.id,
                    name: name,
                    notes: notes,
                    start_date: startDate,
                    end_date: endDate,
                    is_active: true
                };
                if (imageUrl) medData.image_url = imageUrl;

                let savedMedId = id;

                // 2. Insert or Update Medication
                if (id) {
                    // Update
                    const { error: updateError } = await supabase
                        .from('medications')
                        .update(medData)
                        .eq('id', id);
                    if (updateError) throw updateError;
                    
                    // Delete old schedules
                    await supabase.from('schedules').delete().eq('medication_id', id);
                } else {
                    // Insert
                    const { data: newMed, error: insertError } = await supabase
                        .from('medications')
                        .insert([medData])
                        .select('id')
                        .single();
                    if (insertError) throw insertError;
                    savedMedId = newMed.id;
                }

                // 3. Insert Schedules
                const scheduleInserts = localTimes.map(localTimeStr => ({
                    medication_id: savedMedId,
                    time_utc: localTimeToUTC(localTimeStr),
                    days_of_week: selectedDays
                }));

                const { error: schedError } = await supabase
                    .from('schedules')
                    .insert(scheduleInserts);
                
                if (schedError) throw schedError;

                closeModal();
                loadMedications();

            } catch (err) {
                console.error("Error saving medication:", err);
                alert("An error occurred while saving. Please try again.");
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        window.confirmDelete = async function() {
            if(!confirm("Are you sure you want to delete this medication? It will be deactivated and removed from your daily view.")) return;
            
            const id = document.getElementById('med-id').value;
            if(!id) return;

            try {
                const { error } = await supabase
                    .from('medications')
                    .update({ is_active: false })
                    .eq('id', id);
                
                if (error) throw error;
                closeModal();
                loadMedications();
            } catch (err) {
                console.error("Error deleting:", err);
                alert("Failed to delete medication.");
            }
        }

        // Quick toggle from the card switch
        window.toggleMedStatus = async function(id, isChecked) {
            if (!isChecked) {
                const confirmDeactivate = confirm("Deactivate this medication? It will no longer show up in your active lists.");
                if (!confirmDeactivate) {
                    loadMedications(); // reset UI
                    return;
                }
                
                try {
                    await supabase.from('medications').update({ is_active: false }).eq('id', id);
                    loadMedications();
                } catch(e) {
                    console.error("Status update error", e);
                }
            }
        }

        // Initialize App
        init();
    </script>
</body>
</html>
